
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>油飯DD｜蝦皮推廣連結轉換器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="badge">Shopee Affiliate Tool</div>

      <h1>蝦皮推廣連結轉換器</h1>

      <p class="subtitle">
        貼上蝦皮商品連結，快速轉換連結套用優惠券。
      </p>

      <label for="urlInput">蝦皮連結</label>
      <textarea
        id="urlInput"
        placeholder="一次最多貼上 5 個蝦皮連結，每行一個&#10;https://shopee.tw/..."
      ></textarea>

      

      <div class="buttons">
        <button id="convertBtn">產生推廣連結</button>
        <button id="clearBtn" class="secondary">清除</button>
      </div>

      <p id="status"></p>

      <div id="resultArea" class="result-area"></div>
    </section>
  </main>

  <div id="toast">已複製</div>

  <script src="script.js"></script>
</body>
</html>
