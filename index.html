
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>油飯DD｜蝦皮推廣連結轉換器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="badge">油飯DD｜省錢攻略</div>

      <h1>蝦皮推廣連結轉換器</h1>

      <p class="subtitle">
        快速轉換連結套用專屬優惠券!!!
      </p>

      <label for="urlInput">蝦皮連結</label>
      <textarea
        id="urlInput"
        placeholder="一次最多貼上 5 個蝦皮連結，每行一個"
      ></textarea>

      

      <div class="buttons">
        <button id="convertBtn">產生推廣連結</button>
        <button id="clearBtn" class="secondary">清除</button>
      </div>

      <a
  class="line-btn"
  href="https://openchat.line.me/tw/cover/9cwy6cXv3uiE-xwhdZXMymMkyIfml-QK6YKdlNWu5wIN0UWCRVldqeNU_T4?utm_source=line-openchat-seo&utm_medium=similar&utm_campaign=cover"
  target="_blank"
  rel="noopener noreferrer"
>
  加入 LINE 社群看更多優惠
</a>

      <p id="status"></p>

      <div id="resultArea" class="result-area"></div>
    </section>
  </main>

  <div id="toast">已複製</div>

  <script src="script.js"></script>
</body>
</html>
